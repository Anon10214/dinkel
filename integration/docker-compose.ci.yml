version: '3'

services:
  neo4j:
    image: neo4j:5.7.0
    ports:
      - 7687:7687
    environment:
      - NEO4J_AUTH=none
      - apoc.export.file.enabled=true
      - apoc.import.file.enabled=true
      - apoc.import.file.use_neo4j_config=true
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
